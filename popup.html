<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Social Nutrition Label</title>
  <style>
  body {
    width: 260px;
    padding: 15px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    text-align: center;

    /* Dark gradient background */
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #e2e8f0;
  }

  /* Glass container */
  .glass {
    background: rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 15px;

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  }

  h2 {
    font-size: 1.3rem;
    margin-bottom: 5px;
    color: #f8fafc;
  }

  p {
    font-size: 0.85rem;
    color: #cbd5f5;
    margin-bottom: 15px;
  }

  button {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;

    transition: all 0.2s ease;
    box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
  }

  button:active {
    transform: scale(0.98);
  }

  #status {
    margin-top: 12px;
    font-size: 0.85rem;
    color: #94a3b8;
  }

  #streak {
    margin-top: 12px;
    font-size: 0.95rem;
    font-weight: bold;
    color: #ffb347;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .fire {
    display: inline-block;
    animation: fireBounce 1s infinite ease-in-out, fireGlow 1.5s infinite alternate;
    transform-origin: center bottom;
    filter: drop-shadow(0 0 6px rgba(255, 140, 0, 0.6));
  }

  @keyframes fireBounce {
    0%, 100% {
      transform: translateY(0) scale(1);
    }
    50% {
      transform: translateY(-2px) scale(1.08);
    }
  }

  @keyframes fireGlow {
    0% {
      filter: drop-shadow(0 0 4px rgba(255, 120, 0, 0.4));
    }
    100% {
      filter: drop-shadow(0 0 10px rgba(255, 170, 0, 0.9));
    }
  }

  </style>
</head>
<body>
  <div class="glass">
    <h2>Integrity Check</h2>
    <p>Analyze the post you're viewing</p>

    <button id="scrapeBtn">Analyze Post</button>

    <div id="status">Ready to scan...</div>
    <div id="streak"><span class="fire">🔥</span> <span id="streakText">0 day streak</span></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
